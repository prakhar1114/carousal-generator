<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Gen</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0f172a;
            --panel: #111827;
            --panel-soft: #1f2937;
            --border: #334155;
            --text: #e5eefc;
            --muted: #94a3b8;
            --accent: #14b8a6;
            --accent-strong: #0f766e;
            --danger: #ef4444;
            --shadow: 0 24px 60px rgba(2, 6, 23, 0.35);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top right, rgba(20, 184, 166, 0.22), transparent 30%),
                linear-gradient(180deg, #0f172a 0%, #020617 100%);
            color: var(--text);
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        button {
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 0.7rem 1rem;
            background: var(--panel-soft);
            color: var(--text);
            cursor: pointer;
            transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
        }

        button:hover {
            transform: translateY(-1px);
            border-color: rgba(148, 163, 184, 0.35);
        }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        button:disabled:hover {
            transform: none;
            border-color: transparent;
        }

        button.primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: white;
        }

        button.danger {
            background: rgba(239, 68, 68, 0.12);
            border-color: rgba(239, 68, 68, 0.35);
            color: #fecaca;
        }

        button.subtle {
            background: rgba(15, 23, 42, 0.55);
            border-color: var(--border);
        }

        input,
        select,
        textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.7);
            color: var(--text);
            padding: 0.75rem 0.9rem;
        }

        textarea {
            min-height: 70px;
            resize: vertical;
            field-sizing: content;
            line-height: 1.5;
        }

        .page {
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
            min-height: 100vh;
        }

        .sidebar {
            border-right: 1px solid rgba(148, 163, 184, 0.12);
            background: rgba(2, 6, 23, 0.82);
            backdrop-filter: blur(18px);
            padding: 1.2rem;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .brand {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .brand h1 {
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .sidebar p {
            color: var(--muted);
            margin-top: 0;
        }

        .project-list {
            display: grid;
            gap: 0.65rem;
            margin-top: 1rem;
        }

        .project-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 0.55rem;
            align-items: stretch;
        }

        .project-item {
            width: 100%;
            text-align: left;
            padding: 0.9rem 1rem;
            border: 1px solid rgba(148, 163, 184, 0.15);
            background: rgba(15, 23, 42, 0.65);
        }

        .project-item.active {
            border-color: rgba(20, 184, 166, 0.65);
            background: rgba(20, 184, 166, 0.15);
        }

        .project-item small {
            display: block;
            color: var(--muted);
            margin-top: 0.35rem;
        }

        .project-delete-btn {
            padding-inline: 0.85rem;
            align-self: stretch;
        }

        .project-card {
            padding: 1.25rem;
            display: grid;
            gap: 0.9rem;
        }

        .content {
            padding: 1.5rem;
        }

        .topbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .topbar h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .status {
            min-height: 1.5rem;
            color: var(--muted);
        }

        .status.error {
            color: #fca5a5;
        }

        .panel {
            background: rgba(17, 24, 39, 0.85);
            border: 1px solid rgba(148, 163, 184, 0.14);
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .settings {
            padding: 1.25rem;
            margin-bottom: 1.25rem;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 220px));
            gap: 0.9rem;
            margin-bottom: 1rem;
        }

        .field {
            display: grid;
            gap: 0.45rem;
        }

        .field label {
            color: var(--muted);
            font-size: 0.92rem;
        }

        .actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .generation-summary {
            display: grid;
            gap: 0.75rem;
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 16px;
            border: 1px solid rgba(20, 184, 166, 0.2);
            background: rgba(15, 23, 42, 0.55);
        }

        .generation-summary-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .generation-summary-title {
            font-weight: 600;
        }

        .generation-summary-meta {
            color: var(--muted);
            font-size: 0.92rem;
        }

        .progress-track {
            width: 100%;
            height: 12px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(51, 65, 85, 0.75);
        }

        .progress-fill {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            transition: width 180ms ease;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 88px;
            padding: 0.28rem 0.6rem;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            font-size: 0.78rem;
            text-transform: capitalize;
            background: rgba(15, 23, 42, 0.85);
            color: var(--muted);
        }

        .status-pill.running,
        .status-pill.queued,
        .status-pill.cancelling {
            border-color: rgba(20, 184, 166, 0.35);
            color: #99f6e4;
        }

        .status-pill.completed {
            border-color: rgba(74, 222, 128, 0.35);
            color: #bbf7d0;
        }

        .status-pill.failed,
        .status-pill.interrupted {
            border-color: rgba(239, 68, 68, 0.35);
            color: #fecaca;
        }

        .status-pill.cancelled {
            border-color: rgba(148, 163, 184, 0.35);
            color: #cbd5e1;
        }

        .slides {
            display: grid;
            gap: 1rem;
        }

        .slide-card {
            display: grid;
            grid-template-columns: minmax(320px, 1fr) minmax(280px, 1fr);
            gap: 1rem;
            padding: 1rem;
        }

        .slide-left,
        .slide-right {
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-radius: 18px;
            padding: 1rem;
        }

        .slide-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .slide-header h3,
        .slide-right h3 {
            margin: 0;
            font-size: 1.05rem;
        }

        .slide-controls {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .slide-meta {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .preview {
            min-height: 360px;
            border-radius: 16px;
            border: 1px dashed rgba(148, 163, 184, 0.22);
            display: grid;
            place-items: center;
            overflow: hidden;
            position: relative;
            background:
                linear-gradient(135deg, rgba(20, 184, 166, 0.08), rgba(15, 23, 42, 0.4));
        }

        .preview img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: #020617;
        }

        .preview-placeholder {
            padding: 1.25rem;
            text-align: center;
        }

        .preview-feedback {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
            text-align: center;
            background: rgba(2, 6, 23, 0.82);
            backdrop-filter: blur(6px);
        }

        .preview-feedback.error {
            background: rgba(69, 10, 10, 0.82);
        }

        .preview-feedback.cancelled {
            background: rgba(30, 41, 59, 0.86);
        }

        .preview-feedback-content {
            max-width: 240px;
            display: grid;
            gap: 0.75rem;
            justify-items: center;
        }

        .preview-spinner {
            width: 34px;
            height: 34px;
            border: 3px solid rgba(148, 163, 184, 0.28);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        .preview-feedback-title {
            font-weight: 600;
        }

        .preview-feedback-message {
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .preview-feedback.error .preview-feedback-message {
            color: #fecaca;
        }

        .preview-feedback.cancelled .preview-feedback-message {
            color: #cbd5e1;
        }

        .dropzone {
            border: 1px dashed rgba(148, 163, 184, 0.3);
            border-radius: 16px;
            padding: 0.85rem;
            background: rgba(2, 6, 23, 0.45);
        }

        .dropzone.dragover {
            border-color: rgba(20, 184, 166, 0.8);
            background: rgba(20, 184, 166, 0.08);
        }

        .dropzone-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.75rem;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .thumb-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 0.75rem;
        }

        .thumb {
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 14px;
            overflow: hidden;
            background: rgba(15, 23, 42, 0.7);
        }

        .thumb-preview {
            width: 100%;
            padding: 0;
            border: 0;
            border-radius: 0;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.7));
            display: block;
        }

        .thumb-preview:hover {
            transform: none;
            border-color: transparent;
        }

        .thumb-preview img {
            display: block;
            width: 100%;
            height: 110px;
            object-fit: contain;
            background: rgba(15, 23, 42, 0.92);
        }

        .thumb-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.4rem;
            padding: 0.55rem;
        }

        .thumb-footer span {
            font-size: 0.78rem;
            color: var(--muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .hidden-input {
            display: none;
        }

        .empty-state {
            padding: 2rem;
            text-align: center;
            color: var(--muted);
        }

        .slides-footer {
            display: flex;
            justify-content: center;
        }

        .image-modal {
            position: fixed;
            inset: 0;
            z-index: 40;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: rgba(2, 6, 23, 0.84);
            backdrop-filter: blur(6px);
        }

        .image-modal-card {
            width: min(100%, 1080px);
            max-height: calc(100vh - 4rem);
            display: grid;
            gap: 1rem;
            background: rgba(15, 23, 42, 0.98);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 18px;
            padding: 1rem;
            box-shadow: var(--shadow);
        }

        .image-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .image-modal-header h3 {
            margin: 0;
            font-size: 1rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .image-modal-body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 240px;
            max-height: calc(100vh - 10rem);
            overflow: auto;
            border-radius: 14px;
            background: rgba(2, 6, 23, 0.95);
        }

        .image-modal-body img {
            display: block;
            width: auto;
            max-width: 100%;
            height: auto;
            max-height: calc(100vh - 11rem);
            object-fit: contain;
        }

        .script-layout {
            display: grid;
            gap: 1rem;
        }

        .script-panel {
            padding: 1.25rem;
        }

        .script-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .script-header h3,
        .storyboard-card h3 {
            margin: 0;
        }

        .script-copy {
            color: var(--muted);
            line-height: 1.45;
        }

        .rules-grid {
            display: grid;
            gap: 1rem;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .rule-actions {
            display: flex;
            gap: 0.65rem;
            flex-wrap: wrap;
            margin-top: 0.55rem;
        }

        .storyboard-list {
            display: grid;
            gap: 1.15rem;
        }

        .storyboard-progress {
            margin-top: 0.9rem;
            display: grid;
            gap: 0.45rem;
        }

        .storyboard-progress-label {
            color: var(--muted);
            font-size: 0.88rem;
        }

        .storyboard-progress-track {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            background: rgba(51, 65, 85, 0.7);
            overflow: hidden;
        }

        .storyboard-progress-fill {
            width: 38%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            animation: storyboard-progress-indeterminate 1.1s ease-in-out infinite;
            transform-origin: left center;
        }

        @keyframes storyboard-progress-indeterminate {
            0% {
                transform: translateX(-100%) scaleX(0.8);
            }
            50% {
                transform: translateX(120%) scaleX(1.05);
            }
            100% {
                transform: translateX(290%) scaleX(0.8);
            }
        }

        .storyboard-card {
            padding: 1.25rem;
            display: grid;
            gap: 1.1rem;
            border-color: rgba(148, 163, 184, 0.22);
            background:
                linear-gradient(180deg, rgba(30, 41, 59, 0.72), rgba(15, 23, 42, 0.92)),
                rgba(17, 24, 39, 0.92);
            box-shadow:
                0 18px 42px rgba(2, 6, 23, 0.32),
                inset 0 1px 0 rgba(148, 163, 184, 0.08);
        }

        .storyboard-card.dragging {
            opacity: 0.55;
        }

        .storyboard-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .storyboard-card-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .storyboard-card-title h3 {
            font-size: 1.05rem;
            letter-spacing: 0.01em;
        }

        .storyboard-card-body {
            display: grid;
            gap: 1rem;
            max-width: 58rem;
        }

        .storyboard-notes-panel {
            display: grid;
            gap: 0.8rem;
            max-width: 54rem;
            padding: 1rem;
            border: 1px solid rgba(148, 163, 184, 0.16);
            border-radius: 16px;
            background: rgba(15, 23, 42, 0.52);
        }

        .storyboard-notes-copy {
            color: var(--muted);
            line-height: 1.5;
            max-width: 48rem;
        }

        .storyboard-notes-panel textarea {
            min-height: 110px;
            max-width: 54rem;
            line-height: 1.6;
        }

        .storyboard-notes-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .storyboard-text-field {
            max-width: 54rem;
        }

        .storyboard-text-field label {
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.76rem;
        }

        .storyboard-text-field textarea,
        .storyboard-idea-field textarea {
            max-width: 54rem;
            min-height: 96px;
            line-height: 1.6;
        }

        .storyboard-bottom-cta {
            display: flex;
            justify-content: flex-end;
            margin-top: 1.25rem;
            padding-top: 0.35rem;
            border-top: 1px solid rgba(148, 163, 184, 0.14);
        }

        .storyboard-bottom-cta button {
            min-width: min(100%, 240px);
        }

        .drag-handle {
            cursor: grab;
            user-select: none;
            border: 1px dashed rgba(148, 163, 184, 0.35);
            border-radius: 10px;
            padding: 0.45rem 0.6rem;
            color: var(--muted);
            background: rgba(2, 6, 23, 0.35);
        }

        .readonly-input {
            display: flex;
            align-items: center;
            min-height: 48px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.45);
            padding: 0.75rem 0.9rem;
            color: var(--text);
        }

        .settings-modal-grid {
            display: grid;
            gap: 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 1080px) {
            .page {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
                height: auto;
                border-right: 0;
                border-bottom: 1px solid rgba(148, 163, 184, 0.12);
            }

            .settings-grid,
            .slide-card {
                grid-template-columns: 1fr;
            }

            .topbar-right,
            .topbar-actions {
                width: 100%;
                justify-content: flex-start;
            }

            .storyboard-bottom-cta {
                justify-content: stretch;
            }

            .storyboard-bottom-cta button {
                width: 100%;
            }

            .storyboard-notes-actions > * {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <aside class="sidebar">
            <div class="brand">
                <div>
                    <h1>Carousel Gen</h1>
                    <p>Gemini image carousel builder</p>
                </div>
                <button id="new-project-btn" class="primary" type="button">New</button>
            </div>
            <div id="project-list" class="project-list"></div>
        </aside>

        <main class="content">
            <div class="topbar">
                <div>
                    <h2 id="project-title">No project selected</h2>
                    <div id="project-meta" class="status"></div>
                </div>
                <div class="topbar-right">
                    <div id="topbar-actions" class="topbar-actions"></div>
                    <div id="status" class="status"></div>
                </div>
            </div>

            <div id="app-root"></div>
        </main>
    </div>

    <script>
        const state = {
            projects: [],
            currentProject: null,
        };
        const uiState = {
            slideFeedback: {},
            generationControllers: {},
            imageModal: null,
            currentPage: "editor",
            defaults: {
                general_rules: "",
                hook_rules: "",
                default_characters: "",
                refinement_rules: "",
            },
            defaultsLoaded: false,
            showAdvancedRules: false,
            expandedScriptRuleEditors: {
                general_rules: false,
                hook_rules: false,
                default_characters: false,
            },
            settingsModalOpen: false,
            draggingStoryboardIndex: null,
            storyboardNotesOpenIndex: null,
            storyboardNotesDrafts: {},
            batchPollIntervalId: null,
            batchPollRequestInFlight: false,
            storyboardGenerationInFlight: false,
        };

        const aspectOptions = ["1:1", "4:5", "9:16", "16:9", "21:9", "3:4"];
        const resolutionOptions = ["1K", "2K", "4K"];
        const batchActiveStates = new Set(["queued", "running", "cancelling"]);

        const projectListEl = document.getElementById("project-list");
        const appRootEl = document.getElementById("app-root");
        const projectTitleEl = document.getElementById("project-title");
        const projectMetaEl = document.getElementById("project-meta");
        const topbarActionsEl = document.getElementById("topbar-actions");
        const statusEl = document.getElementById("status");
        const newProjectBtn = document.getElementById("new-project-btn");

        function setStatus(message = "", isError = false) {
            statusEl.textContent = message;
            statusEl.classList.toggle("error", Boolean(isError));
        }

        function getInitialProjectPage(project) {
            return project?.editor_ready ? "editor" : "script";
        }

        function setCurrentPage(page) {
            uiState.currentPage = page === "script" ? "script" : "editor";
        }

        function getBatchGeneration() {
            return state.currentProject?.batch_generation || null;
        }

        function getProjectSummary(projectName) {
            return state.projects.find((project) => project.name === projectName)
                || (state.currentProject?.name === projectName ? state.currentProject : null);
        }

        function getCurrentScriptState() {
            return state.currentProject?.script || {
                general_rules_override: null,
                hook_rules_override: null,
                default_characters_override: null,
                refinement_rules_override: null,
                carousel_idea: "",
                character_reference_images: [],
                storyboard: [],
            };
        }

        function getEffectiveRule(ruleName) {
            const script = getCurrentScriptState();
            const overrideKey = `${ruleName}_override`;
            const overrideValue = script[overrideKey];
            if (overrideValue !== null && overrideValue !== undefined) {
                return String(overrideValue);
            }
            return String(uiState.defaults[ruleName] || "");
        }

        function isBatchBusy() {
            const batch = getBatchGeneration();
            return Boolean(batch && batchActiveStates.has(batch.status));
        }

        function formatGenerationState(stateValue) {
            if (!stateValue) {
                return "idle";
            }
            return String(stateValue).replaceAll("_", " ");
        }

        function getBatchProcessedSlides(batch) {
            if (!batch) {
                return 0;
            }
            if (batch.status === "cancelled" || batch.status === "interrupted") {
                return Number(batch.total_slides || 0);
            }
            return Number(batch.processed_slides || 0);
        }

        function getBatchProgressPercent(batch) {
            const total = Math.max(1, Number(batch?.total_slides || 0));
            return Math.min(100, Math.round((getBatchProcessedSlides(batch) / total) * 100));
        }

        async function refreshProjectIndex() {
            const data = await fetchJson("/api/projects");
            state.projects = data.projects || [];
            renderProjectList();
        }

        function stopBatchPolling() {
            if (uiState.batchPollIntervalId) {
                window.clearInterval(uiState.batchPollIntervalId);
                uiState.batchPollIntervalId = null;
            }
        }

        function syncBatchStatusMessage() {
            const batch = getBatchGeneration();
            if (!batch || !batch.message) {
                return;
            }
            setStatus(batch.message, batch.status === "failed" || batch.status === "interrupted");
        }

        async function fetchJson(url, options = {}) {
            const response = await fetch(url, options);
            let data = {};
            try {
                data = await response.json();
            } catch (error) {
                data = {};
            }

            if (!response.ok) {
                throw new Error(data.error || `Request failed: ${response.status}`);
            }

            return data;
        }

        async function ensureDefaultsLoaded(forceReload = false) {
            if (uiState.defaultsLoaded && !forceReload) {
                return uiState.defaults;
            }

            const data = await fetchJson("/api/defaults");
            uiState.defaults = {
                general_rules: data.defaults?.general_rules || "",
                hook_rules: data.defaults?.hook_rules || "",
                default_characters: data.defaults?.default_characters || "",
                refinement_rules: data.defaults?.refinement_rules || "",
            };
            uiState.defaultsLoaded = true;
            return uiState.defaults;
        }

            const script = getCurrentScriptState();
            return {

                hook_rules_override: script.hook_rules_override,
                default_characters_override: script.default_characters_override,
                refinement_rules_override: script.refinement_rules_override,
                carousel_idea: script.carousel_idea || "",
                character_reference_images: Array.isArray(script.character_reference_images)
                    ? [...script.character_reference_images]
                    : [],
                storyboard: Array.isArray(script.storyboard)
                    ? script.storyboard.map((card) => ({
                        hook: card.hook || "",
                        visual_description: card.visual_description || "",
                    }))
                    : [],
            };
        }

        async function deleteProjectRequest(projectName, confirmDelete = false) {
            const response = await fetch(`/api/projects/${encodeURIComponent(projectName)}`, {
                method: "DELETE",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({confirm: confirmDelete}),
            });
            let data = {};
            try {
                data = await response.json();
            } catch (error) {
                data = {};
            }
            return {response, data};
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function autoResizeTextarea(textarea) {
            textarea.style.height = "auto";
            textarea.style.height = `${textarea.scrollHeight}px`;
        }

        function bindAutoResize(root = document) {
            root.querySelectorAll("textarea").forEach((textarea) => {

                textarea.addEventListener("input", () => autoResizeTextarea(textarea));

            return uiState.generationControllers[String(slideIndex)] || null;

        function renderPreview(slide) {
            const feedback = getSlideFeedback(slide.index);
            const hasImage = slide.generated && slide.preview_url;
            const serverState = slide.generation_status || "idle";

            let inner = hasImage
                ? `<img src="${slide.preview_url}" alt="Slide ${slide.index} preview">`
                : '<div class="slide-meta preview-placeholder">Generate this slide to preview the output.</div>';

            if (feedback?.state === "loading") {
                inner += `
                    <div class="preview-feedback">
                        <div class="preview-feedback-content">
                            <div class="preview-spinner" aria-hidden="true"></div>
                            <div class="preview-feedback-title">${escapeHtml(feedback.title || "Generating image")}</div>
                            <div class="preview-feedback-message">${escapeHtml(feedback.message || "Please wait...")}</div>
                            <button type="button" class="subtle" data-cancel-generation="${slide.index}">Cancel</button>
                        </div>
                    </div>
                `;
            }

            if (feedback?.state === "error") {
                inner += `
                    <div class="preview-feedback error">
                        <div class="preview-feedback-content">
                            <div class="preview-feedback-title">${escapeHtml(feedback.title || "Generation failed")}</div>
                            <div class="preview-feedback-message">${escapeHtml(feedback.message || "Something went wrong.")}</div>
                        </div>
                    </div>
                `;
            }

            if (feedback?.state === "cancelled") {
                inner += `
                    <div class="preview-feedback cancelled">
                        <div class="preview-feedback-content">
                            <div class="preview-feedback-title">${escapeHtml(feedback.title || "Generation cancelled")}</div>
                            <div class="preview-feedback-message">${escapeHtml(feedback.message || "The request was cancelled.")}</div>
                        </div>
                    </div>
                `;
            }

            if (!feedback && serverState === "running") {
                inner += `
                    <div class="preview-feedback">
                        <div class="preview-feedback-content">
                            <div class="preview-spinner" aria-hidden="true"></div>
                            <div class="preview-feedback-title">Generating in background</div>
                            <div class="preview-feedback-message">This slide is currently being generated.</div>
                        </div>
                    </div>
                `;
            }

            if (!feedback && serverState === "queued") {
                inner += `
                    <div class="preview-feedback cancelled">
                        <div class="preview-feedback-content">
                            <div class="preview-feedback-title">Queued</div>
                            <div class="preview-feedback-message">This slide is waiting for its turn in the background batch.</div>
                        </div>
                    </div>
                `;
            }

            if (!feedback && (serverState === "failed" || serverState === "interrupted")) {
                inner += `
                    <div class="preview-feedback error">
                        <div class="preview-feedback-content">
                            <div class="preview-feedback-title">${escapeHtml(formatGenerationState(serverState))}</div>
                            <div class="preview-feedback-message">${escapeHtml(slide.generation_error || "This slide was not generated successfully.")}</div>
                        </div>
                    </div>
                `;
            }

            return inner;
        }

        async function loadProjects(selectProjectName = null, preferredPage = null) {
            await refreshProjectIndex();

            if (selectProjectName) {
                await loadProject(selectProjectName, preferredPage);
                return;
            }

            if (!state.currentProject && state.projects.length > 0) {
                await loadProject(state.projects[0].name, preferredPage);
            } else if (!state.currentProject) {
                renderApp();
            } else {
                renderProjectList();
            }
        }

        async function loadProject(name, preferredPage = null) {
            setStatus("Loading project...");
            const data = await fetchJson(`/api/projects/${encodeURIComponent(name)}`);
            state.currentProject = data.project;
            uiState.storyboardNotesOpenIndex = null;
            uiState.storyboardNotesDrafts = {};
            setCurrentPage(preferredPage || getInitialProjectPage(data.project));
            if (uiState.currentPage === "script") {
                await ensureDefaultsLoaded();
            }
            renderProjectList();
            renderApp();
            if (isBatchBusy() || getBatchGeneration()?.message) {
                syncBatchStatusMessage();
            } else {
                setStatus("");
            }
        }

        async function deleteProject(projectName) {
            const projectSummary = getProjectSummary(projectName);
            if (!projectSummary) {
                setStatus("Project could not be found.", true);
                return;
            }

            setStatus(`Deleting ${projectName}...`);
            let result = await deleteProjectRequest(projectName, false);
            if (result.response.status === 409 && result.data?.requires_confirmation) {
                const confirmed = window.confirm(result.data.project?.delete_warning || result.data.error || "Are you sure you want to delete this project?");
                if (!confirmed) {
                    setStatus("Project deletion cancelled.");
                    return;
                }
                result = await deleteProjectRequest(projectName, true);
            }

            if (!result.response.ok) {
                setStatus(result.data.error || `Request failed: ${result.response.status}`, true);
                return;
            }

            const deletedCurrentProject = state.currentProject?.name === projectName;
            await refreshProjectIndex();

            if (deletedCurrentProject) {
                stopBatchPolling();
                state.currentProject = null;
                if (state.projects.length > 0) {
                    await loadProject(state.projects[0].name, uiState.currentPage);
                    setStatus(`Deleted project ${projectName}.`);
                } else {
                    renderApp();
                    setStatus(`Deleted project ${projectName}.`);
                }
                return;
            }

            renderProjectList();
            setStatus(`Deleted project ${projectName}.`);
        }

        async function pollBatchGeneration() {
            if (!state.currentProject || uiState.batchPollRequestInFlight) {
                return;
            }

            const projectName = state.currentProject.name;
            uiState.batchPollRequestInFlight = true;
            try {
                const data = await fetchJson(`/api/projects/${encodeURIComponent(projectName)}/generation-status`);
                if (!state.currentProject || state.currentProject.name !== projectName) {
                    return;
                }
                state.currentProject = data.project;
                renderApp();
                syncBatchStatusMessage();

                if (!data.active) {
                    stopBatchPolling();
                    await refreshProjectIndex();
                    syncBatchStatusMessage();
                }
            } catch (error) {
                stopBatchPolling();
                setStatus(error.message || "Unable to refresh generation progress.", true);
            } finally {
                uiState.batchPollRequestInFlight = false;
            }
        }

        function syncBatchPolling() {
            if (isBatchBusy()) {
                if (!uiState.batchPollIntervalId) {
                    uiState.batchPollIntervalId = window.setInterval(() => {
                        void pollBatchGeneration();
                    }, 1500);
                }
                return;
            }
            stopBatchPolling();
        }

        function renderProjectList() {
            if (state.projects.length === 0) {
                projectListEl.innerHTML = '<div class="empty-state">No projects yet. Create one to start generating slides.</div>';
                return;

            projectListEl.innerHTML = state.projects.map((project) => `
                <div class="project-row">
                    <button
                        class="project-item ${state.currentProject?.name === project.name ? "active" : ""}"
                        type="button"
                        data-project-name="${escapeHtml(project.name)}"
                    >
                        ${escapeHtml(project.name)}

                    </button>
                    <button
                        type="button"
                        class="danger project-delete-btn"
                        data-delete-project="${escapeHtml(project.name)}"
                    >
                        Delete
                    </button>
                </div>
            `).join("");

            projectListEl.querySelectorAll("[data-project-name]").forEach((button) => {
                button.addEventListener("click", () => loadProject(button.dataset.projectName));
            });
            projectListEl.querySelectorAll("[data-delete-project]").forEach((button) => {
