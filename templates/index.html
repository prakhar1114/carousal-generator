                            const noteDraft = uiState.storyboardNotesDrafts[String(slideIndex)] || "";
                            return `
                            <article
                                class="panel storyboard-card"
                                draggable="true"
                                data-storyboard-card="${slideIndex}"
                            >
                                <div class="storyboard-card-header">
                                    <div class="storyboard-card-title">
                                        <button type="button" class="drag-handle" data-drag-handle="${slideIndex}">⇅</button>
                                        <h3>Slide ${slideIndex}</h3>
                                    </div>
                                    <div class="actions" style="margin-top: 0;">
                                        <button type="button" class="subtle" data-toggle-storyboard-notes="${slideIndex}">Update with User notes</button>
                                        <button type="button" class="danger" data-remove-storyboard-slide="${slideIndex}" ${script.storyboard.length <= 1 ? "disabled" : ""}>Remove slide</button>
                                    </div>
                                </div>

                                ${notesOpen ? `
                                    <div class="storyboard-notes-panel">
                                        <div>
                                            <label for="storyboard-notes-${slideIndex}">User notes</label>
                                            <div class="storyboard-notes-copy">Add guidance for this slide only. These notes are used once for this update and are not saved after a successful refresh.</div>
                                        </div>
                                        <textarea id="storyboard-notes-${slideIndex}" data-storyboard-notes-input="${slideIndex}" placeholder="Example: Make the hook more contrarian, keep the same character, and shift the visual to a tighter close-up.">${escapeHtml(noteDraft)}</textarea>
                                        <div class="storyboard-notes-actions">
                                            <button type="button" class="primary" data-submit-storyboard-notes="${slideIndex}">Update Notes</button>
                                            <button type="button" class="subtle" data-cancel-storyboard-notes="${slideIndex}">Cancel</button>
                                        </div>
                                    </div>
                                ` : ""}

                                <div class="storyboard-card-body">
                                    <div class="field storyboard-text-field">
                                        <label for="storyboard-hook-${slideIndex}">Hook / one-liner</label>
                                        <textarea id="storyboard-hook-${slideIndex}" data-storyboard-field="hook" data-storyboard-index="${slideIndex}">${escapeHtml(card.hook || "")}</textarea>
                                    </div>

                                    <div class="field storyboard-text-field">
                                        <label for="storyboard-visual-${slideIndex}">Visual description</label>
                                        <textarea id="storyboard-visual-${slideIndex}" data-storyboard-field="visual_description" data-storyboard-index="${slideIndex}">${escapeHtml(card.visual_description || "")}</textarea>
                                    </div>
                                </div>
                            </article>
                        `;
                        }).join("")}
                    </section>

                    <section class="panel script-panel">
                        <div class="actions">
                            <button type="button" class="subtle" id="add-storyboard-slide-btn">Add slide</button>
                        </div>
                    </section>

                    <section class="storyboard-bottom-cta">
                        <button type="button" class="primary" id="refine-storyboard-btn">Continue to Generation</button>
                    </section>
                </section>
            `;
        }

        function renderScriptWriter() {
            const script = getCurrentScriptState();
            return `
                ${script.storyboard && script.storyboard.length > 0 ? renderStoryboardView() : renderScriptSetup()}
                ${renderGlobalDefaultsModal()}
                ${renderImageModal()}
            `;
        }

        function renderStoryboardProgress() {
            return `
                <div class="storyboard-progress">
                    <div class="storyboard-progress-label">Generating storyboard. Please wait...</div>
                    <div class="storyboard-progress-track" role="progressbar" aria-label="Generating storyboard" aria-valuemin="0" aria-valuemax="100" aria-valuetext="In progress">
                        <div class="storyboard-progress-fill"></div>
                    </div>
                </div>
            `;
        }

        function renderSettings() {
            const project = state.currentProject;
            const batchBusy = isBatchBusy();
            return `
                <section class="panel settings">
                    <div class="settings-grid">
                        <div class="field">
                            <label for="aspect-ratio">Aspect Ratio</label>
                            <select id="aspect-ratio" ${batchBusy ? "disabled" : ""}>
                                ${aspectOptions.map((option) => `
                                    <option value="${option}" ${project.aspect_ratio === option ? "selected" : ""}>${option}</option>
                                `).join("")}
                            </select>
                        </div>
                        <div class="field">
                            <label for="resolution">Resolution</label>
                            <select id="resolution" ${batchBusy ? "disabled" : ""}>
                                ${resolutionOptions.map((option) => `
                                    <option value="${option}" ${project.resolution === option ? "selected" : ""}>${option}</option>
                                `).join("")}
                            </select>
                        </div>
                        <div class="field">
                            <label for="page-count">Pages</label>
                            <div id="page-count" class="readonly-input">${project.page_count}</div>
                        </div>
                    </div>

                    <div class="field">
                        <label for="fixed-text-prompt">Fixed Text Prompt</label>
                        <textarea id="fixed-text-prompt" placeholder="Default text appended to every slide prompt" ${batchBusy ? "disabled" : ""}>${escapeHtml(project.fixed_text_prompt || "")}</textarea>
                    </div>

                    <div class="dropzone" id="fixed-images-dropzone" data-target="fixed">
                        <div class="dropzone-header">
                            <span>Fixed Images: click, paste, or drag files here</span>
                            <div>
                                <button class="subtle" type="button" id="fixed-images-add-btn" ${batchBusy ? "disabled" : ""}>Add Images</button>
                                <input class="hidden-input" id="fixed-images-input" type="file" accept="image/*" multiple ${batchBusy ? "disabled" : ""}>
                            </div>
                        </div>
                        <div class="thumb-grid">
                            ${renderImageThumbs(project.fixed_images, "fixed")}
                        </div>
                    </div>

                    ${renderBatchGenerationSummary(project)}

                    <div class="actions">
                        <button class="primary" type="button" id="update-settings-btn" ${batchBusy ? "disabled" : ""}>Update Settings</button>
                        <button type="button" id="generate-all-btn" ${batchBusy ? "disabled" : ""}>Generate All</button>
                        ${batchBusy ? '<button type="button" class="danger" id="cancel-generate-all-btn">Cancel Batch</button>' : ""}
                        ${renderProjectDeleteAction(project)}
                    </div>
                </section>
            `;
        }

        function renderSlides() {
            const project = state.currentProject;
            const batchBusy = isBatchBusy();
            return `
                <section class="slides">
                    ${project.slides.map((slide) => `
                        <article class="panel slide-card">
                            <div class="slide-left">
                                <div class="slide-header">
                                    <h3>Slide ${slide.index}</h3>
                                    <div class="slide-controls">
                                        <span class="status-pill ${escapeHtml(slide.generation_status || "idle")}">${escapeHtml(
                                            slide.generation_status && slide.generation_status !== "idle"
                                                ? formatGenerationState(slide.generation_status)
                                                : (slide.generated ? "generated" : "not generated")
                                        )}</span>
                                    </div>
                                </div>

                                <div class="field">
                                    <label for="slide-prompt-${slide.index}">Slide Prompt</label>
                                    <textarea
                                        id="slide-prompt-${slide.index}"
                                        data-slide-field="prompt"
                                        data-slide-index="${slide.index}"
                                        placeholder="Describe the slide you want Gemini to generate"
                                        ${batchBusy ? "disabled" : ""}
                                    >${escapeHtml(slide.prompt || "")}</textarea>
                                </div>

                                <div class="field" style="margin-top: 0.9rem;">
                                    <label for="slide-fixed-text-${slide.index}">Fixed Text For This Slide</label>
                                    <div class="actions" style="margin: 0 0 0.45rem 0;">
                                        <button
                                            type="button"
                                            class="subtle"
                                            data-reset-fixed-text="${slide.index}"
                                            ${batchBusy ? "disabled" : ""}
                                        >
                                            Reset To Default
                                        </button>
                                    </div>
                                    <textarea
                                        id="slide-fixed-text-${slide.index}"
                                        data-slide-field="fixed_text_prompt_override"
                                        data-slide-index="${slide.index}"
                                        placeholder="Optional slide-level override"
                                        ${batchBusy ? "disabled" : ""}
                                    >${escapeHtml(getSlideOverrideFixedText(slide))}</textarea>
                                </div>

                                <div class="dropzone" style="margin-top: 0.9rem;" data-target="slide" data-slide-index="${slide.index}">
                                    <div class="dropzone-header">
                                        <span>Slide Images: click, paste, or drag files here</span>
                                        <div>
                                            <button class="subtle" type="button" data-open-slide-input="${slide.index}" ${batchBusy ? "disabled" : ""}>Add Images</button>
                                            <input class="hidden-input" id="slide-images-input-${slide.index}" type="file" accept="image/*" multiple ${batchBusy ? "disabled" : ""}>
                                        </div>
                                    </div>
                                    <div class="thumb-grid">
                                        ${renderImageThumbs(slide.images, "slide", slide.index)}
                                    </div>
                                </div>

                                <div class="actions">
                                    <button
                                        class="primary"
                                        type="button"
                                        data-generate-slide="${slide.index}"
                                        ${isSlideBusy(slide.index) || batchBusy ? "disabled" : ""}
                                    >
                                        Generate
                                    </button>
                                    <button
                                        type="button"
                                        data-update-slide="${slide.index}"
                                        ${slide.generated && !isSlideBusy(slide.index) && !batchBusy ? "" : "disabled"}
                                    >
                                        Update
                                    </button>
                                </div>
                            </div>

                            <div class="slide-right">
                                <div class="slide-header">
                                    <h3>Preview</h3>
                                    <div class="slide-meta">${slide.filename}</div>
                                </div>
                                <div class="preview">
                                    ${renderPreview(slide)}
                                </div>
                            </div>
                        </article>
                    `).join("")}
                </section>
            `;
        }

        function renderApp() {
            if (!state.currentProject) {
                stopBatchPolling();
                projectTitleEl.textContent = "No project selected";
                projectMetaEl.textContent = "Create a project to start authoring prompts and generating slides.";
                topbarActionsEl.innerHTML = "";
                appRootEl.innerHTML = `
                    <div class="panel empty-state">
                        <p>Create a project from the sidebar to start building a carousel.</p>
                    </div>
                `;
                return;
            }

            projectTitleEl.textContent = state.currentProject.name;
            projectMetaEl.textContent = state.currentProject.is_valid
                ? `Updated ${state.currentProject.updated_at}`
                : "project.json is empty or invalid.";
            renderTopbarActions();
            appRootEl.innerHTML = state.currentProject.is_valid
                ? (
                    uiState.currentPage === "script"
                        ? renderScriptWriter()
                        : `${renderSettings()}${renderSlides()}${renderImageModal()}${renderGlobalDefaultsModal()}`
                )
                : `${renderInvalidProjectView(state.currentProject)}${renderImageModal()}`;
            bindAutoResize(appRootEl);
            bindProjectDeleteActions();
            if (state.currentProject.is_valid) {
                if (uiState.currentPage === "script") {
                    bindScriptWriterActions();
                    bindImageActions();
                } else {
                    bindProjectInputs();
                    bindImageActions();
                    bindSlideActions();
                }
            }
            bindModalActions();
            syncBatchPolling();
        }

        function bindProjectInputs() {
            const aspectRatioEl = document.getElementById("aspect-ratio");
            const resolutionEl = document.getElementById("resolution");
            const fixedTextEl = document.getElementById("fixed-text-prompt");
            const updateSettingsBtn = document.getElementById("update-settings-btn");
            const generateAllBtn = document.getElementById("generate-all-btn");
            const cancelGenerateAllBtn = document.getElementById("cancel-generate-all-btn");

            if (!aspectRatioEl || !resolutionEl || !fixedTextEl || !updateSettingsBtn || !generateAllBtn) {
                return;
            }

            aspectRatioEl.addEventListener("change", () => {
                state.currentProject.aspect_ratio = aspectRatioEl.value;
            });

            resolutionEl.addEventListener("change", () => {
                state.currentProject.resolution = resolutionEl.value;
            });

            fixedTextEl.addEventListener("input", () => {
                state.currentProject.fixed_text_prompt = fixedTextEl.value;
            });

            fixedTextEl.addEventListener("paste", async (event) => {
                const imageFile = getImageFileFromClipboard(event);
                if (!imageFile) {
                    return;
                }

                event.preventDefault();
                state.currentProject.fixed_text_prompt = fixedTextEl.value;
                await uploadImages([imageFile], "fixed");
            });

            updateSettingsBtn.addEventListener("click", () => saveProject(true, "Settings updated."));
            generateAllBtn.addEventListener("click", () => generateAllSlides());
            if (cancelGenerateAllBtn) {
                cancelGenerateAllBtn.addEventListener("click", () => cancelGenerateAllSlides());
            }
        }

        function bindSlideActions() {
            appRootEl.querySelectorAll("[data-slide-field='prompt']").forEach((textarea) => {
                textarea.addEventListener("input", () => {
                    const slide = state.currentProject.slides[Number(textarea.dataset.slideIndex) - 1];
                    slide.prompt = textarea.value;
                });

                textarea.addEventListener("paste", async (event) => {
                    const imageFile = getImageFileFromClipboard(event);
                    if (!imageFile) {
                        return;
                    }

                    event.preventDefault();
                    const slideIndex = Number(textarea.dataset.slideIndex);
                    state.currentProject.slides[slideIndex - 1].prompt = textarea.value;
                    await uploadImages([imageFile], "slide", slideIndex);
                });
            });

            appRootEl.querySelectorAll("[data-slide-field='fixed_text_prompt_override']").forEach((textarea) => {
                textarea.addEventListener("input", () => {
                    const slide = state.currentProject.slides[Number(textarea.dataset.slideIndex) - 1];
                    const normalized = textarea.value.trim();
                    slide.fixed_text_prompt_override = normalized ? textarea.value : null;
                });
            });

            appRootEl.querySelectorAll("[data-reset-fixed-text]").forEach((button) => {
                button.addEventListener("click", () => {
                    const slide = state.currentProject.slides[Number(button.dataset.resetFixedText) - 1];
                    slide.fixed_text_prompt_override = null;
                    renderApp();
                });
            });

            appRootEl.querySelectorAll("[data-generate-slide]").forEach((button) => {
                button.addEventListener("click", () => generateSlide(Number(button.dataset.generateSlide)));
            });

            appRootEl.querySelectorAll("[data-update-slide]").forEach((button) => {
                button.addEventListener("click", () => updateSlide(Number(button.dataset.updateSlide)));
            });

            appRootEl.querySelectorAll("[data-cancel-generation]").forEach((button) => {
                button.addEventListener("click", () => cancelGeneration(Number(button.dataset.cancelGeneration)));
            });
        }

        function syncScriptDraftFromDom() {
            if (!state.currentProject) {
                return;
            }

            const script = getCurrentScriptState();
            const generalRulesEl = document.getElementById("general-rules");
            const hookRulesEl = document.getElementById("hook-rules");
            const defaultCharactersEl = document.getElementById("default-characters");
            const refinementRulesEl = document.getElementById("refinement-rules");
            const storyboardRefinementRulesEl = document.getElementById("storyboard-refinement-rules");
            const setupIdeaEl = document.getElementById("carousel-idea");
            const storyboardIdeaEl = document.getElementById("storyboard-carousel-idea");

            if (generalRulesEl) {
                script.general_rules_override = (
                    script.general_rules_override !== null || generalRulesEl.value !== (uiState.defaults.general_rules || "")
                )
                    ? generalRulesEl.value
                    : null;
            }
            if (hookRulesEl) {
                script.hook_rules_override = (
                    script.hook_rules_override !== null || hookRulesEl.value !== (uiState.defaults.hook_rules || "")
                )
                    ? hookRulesEl.value
                    : null;
            }
            if (defaultCharactersEl) {
                script.default_characters_override = (
                    script.default_characters_override !== null || defaultCharactersEl.value !== (uiState.defaults.default_characters || "")
                )
                    ? defaultCharactersEl.value
                    : null;
            }
            const activeRefinementRulesEl = refinementRulesEl || storyboardRefinementRulesEl;
            if (activeRefinementRulesEl) {
                script.refinement_rules_override = (
                    script.refinement_rules_override !== null || activeRefinementRulesEl.value !== (uiState.defaults.refinement_rules || "")
                )
                    ? activeRefinementRulesEl.value
                    : null;
            }
            if (setupIdeaEl) {
                script.carousel_idea = setupIdeaEl.value;
            }
            if (storyboardIdeaEl) {
                script.carousel_idea = storyboardIdeaEl.value;
            }

            if (Array.isArray(script.storyboard)) {
                script.storyboard = script.storyboard.map((card, index) => {
                    const hookEl = document.getElementById(`storyboard-hook-${index + 1}`);
                    const visualEl = document.getElementById(`storyboard-visual-${index + 1}`);
                    return {
                        hook: hookEl ? hookEl.value : (card.hook || ""),
                        visual_description: visualEl ? visualEl.value : (card.visual_description || ""),
                    };
                });
            }

            state.currentProject.script = script;
        }

        function setStoryboardNotesDraft(slideIndex, value) {
            uiState.storyboardNotesDrafts[String(slideIndex)] = value;
        }

        function clearStoryboardNotesDraft(slideIndex) {
            delete uiState.storyboardNotesDrafts[String(slideIndex)];
        }

        function remapStoryboardNotesDrafts(mapper) {
            const nextDrafts = {};
            Object.entries(uiState.storyboardNotesDrafts).forEach(([key, value]) => {
                const nextIndex = mapper(Number(key));
                if (Number.isInteger(nextIndex) && nextIndex > 0) {
                    nextDrafts[String(nextIndex)] = value;
                }
            });
            uiState.storyboardNotesDrafts = nextDrafts;
            if (uiState.storyboardNotesOpenIndex !== null) {
                const nextOpenIndex = mapper(uiState.storyboardNotesOpenIndex);
                uiState.storyboardNotesOpenIndex = (
                    Number.isInteger(nextOpenIndex) && nextOpenIndex > 0
                        ? nextOpenIndex
                        : null
                );
            }
        }

        function openStoryboardNotes(slideIndex) {
            syncScriptDraftFromDom();
            uiState.storyboardNotesOpenIndex = slideIndex;
            renderApp();
        }

        function closeStoryboardNotes(slideIndex, {clearDraft = false} = {}) {
            if (uiState.storyboardNotesOpenIndex === slideIndex) {
                uiState.storyboardNotesOpenIndex = null;
            }
            if (clearDraft) {
                clearStoryboardNotesDraft(slideIndex);
            }
            renderApp();
        }

        async function saveScriptState(showMessage = true, successMessage = "Script saved.") {
            if (!state.currentProject) {
                return;
            }

            syncScriptDraftFromDom();
            const data = await fetchJson(`/api/projects/${encodeURIComponent(state.currentProject.name)}/script`, {
                method: "PUT",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(buildScriptPayloadFromState()),
            });
            state.currentProject = data.project;
            renderApp();
            await loadProjects(state.currentProject.name, uiState.currentPage);
            if (showMessage) {
                setStatus(successMessage);
            }
        }

        async function saveRuleAsGlobalDefault(ruleName) {
            syncScriptDraftFromDom();
            const fieldId = ruleName.replaceAll("_", "-");
            const currentValue = document.getElementById(fieldId)?.value ?? getEffectiveRule(ruleName);
            const nextDefaults = {
                ...uiState.defaults,
                [ruleName]: String(currentValue),
            };
            const data = await fetchJson("/api/defaults", {
                method: "PUT",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(nextDefaults),
            });
            uiState.defaults = data.defaults;
            uiState.defaultsLoaded = true;
            setStatus("Global default saved.");
            renderApp();
        }

        async function resetRuleOverride(ruleName) {
            const script = getCurrentScriptState();
            script[`${ruleName}_override`] = null;
            state.currentProject.script = script;
            await saveScriptState(false);
            setStatus("Rule reset to global default.");
        }

        async function runStoryboardGeneration() {
            if (uiState.storyboardGenerationInFlight) {
                setStatus("Storyboard generation is already in progress.");
                return;
            }
            syncScriptDraftFromDom();
            const idea = getCurrentScriptState().carousel_idea || "";
            if (!idea.trim()) {
                setStatus("Carousel idea is required.", true);
                return;
            }

            uiState.storyboardGenerationInFlight = true;
            renderApp();
            try {
                setStatus("Generating storyboard...");
                const data = await fetchJson(`/api/projects/${encodeURIComponent(state.currentProject.name)}/storyboard/generate`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify(buildScriptPayloadFromState()),
                });
                state.currentProject = data.project;
                renderApp();
                await loadProjects(state.currentProject.name, uiState.currentPage);
                setStatus("Storyboard generated.");
            } finally {
                uiState.storyboardGenerationInFlight = false;
                renderApp();
            }
        }

        async function regenerateStoryboardSlide(slideIndex, userNotes = "") {
            syncScriptDraftFromDom();
            const trimmedNotes = String(userNotes || "").trim();
            setStatus(
                trimmedNotes
                    ? `Updating storyboard slide ${slideIndex} with user notes...`
                    : `Regenerating storyboard slide ${slideIndex}...`
            );
            const data = await fetchJson(`/api/projects/${encodeURIComponent(state.currentProject.name)}/storyboard/regenerate/${slideIndex}`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    ...buildScriptPayloadFromState(),
                    user_notes: userNotes,
                }),
            });
            state.currentProject = data.project;
            uiState.storyboardNotesOpenIndex = null;
            clearStoryboardNotesDraft(slideIndex);
            renderApp();
            await loadProjects(state.currentProject.name, uiState.currentPage);
            setStatus(
                trimmedNotes
                    ? `Storyboard slide ${slideIndex} updated with user notes.`
                    : `Storyboard slide ${slideIndex} regenerated.`
            );
        }

        async function refineStoryboardToEditor() {
            syncScriptDraftFromDom();
            setStatus("Refining storyboard into editor prompts...");
            const data = await fetchJson(`/api/projects/${encodeURIComponent(state.currentProject.name)}/script/refine`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(buildScriptPayloadFromState()),
            });
            state.currentProject = data.project;
            setCurrentPage("editor");
            renderApp();
            await loadProjects(state.currentProject.name, uiState.currentPage);
            setStatus("Refined prompts are ready in the editor.");
        }

        async function addStoryboardSlide() {
            syncScriptDraftFromDom();
            const script = getCurrentScriptState();
            script.storyboard.push({hook: "", visual_description: ""});
            state.currentProject.script = script;
            await saveScriptState(false);
            setStatus("Added a storyboard slide.");
        }

        async function removeStoryboardSlide(slideIndex) {
            syncScriptDraftFromDom();
            const script = getCurrentScriptState();
            if (script.storyboard.length <= 1) {
                setStatus("At least one storyboard slide is required.", true);
                return;
            }
            script.storyboard.splice(slideIndex - 1, 1);
            state.currentProject.script = script;
            remapStoryboardNotesDrafts((index) => {
                if (index === slideIndex) {
                    return null;
                }
                return index > slideIndex ? index - 1 : index;
            });
            await saveScriptState(false);
            setStatus(`Removed storyboard slide ${slideIndex}.`);
        }

        async function persistStoryboardOrder() {
            await saveScriptState(false);
            setStatus("Storyboard order updated.");
        }

        function moveStoryboardCard(fromIndex, toIndex) {
            if (fromIndex === toIndex || fromIndex < 1 || toIndex < 1) {
                return;
            }
            const script = getCurrentScriptState();
            const cards = [...script.storyboard];
            const [movedCard] = cards.splice(fromIndex - 1, 1);
            cards.splice(toIndex - 1, 0, movedCard);
            script.storyboard = cards;
            state.currentProject.script = script;
            remapStoryboardNotesDrafts((index) => {
                if (index === fromIndex) {
                    return toIndex;
                }
                if (fromIndex < toIndex && index > fromIndex && index <= toIndex) {
                    return index - 1;
                }
                if (fromIndex > toIndex && index >= toIndex && index < fromIndex) {
                    return index + 1;
                }
                return index;
            });
        }

        function bindScriptWriterActions() {
            const skipBtn = document.getElementById("skip-to-editor-btn");
            if (skipBtn) {
                skipBtn.addEventListener("click", () => {
                    setCurrentPage("editor");
                    renderApp();
                    setStatus("Opened editor without saving script data.");
                });
            }

            const toggleAdvancedBtn = document.getElementById("toggle-advanced-rules-btn");
            if (toggleAdvancedBtn) {
                toggleAdvancedBtn.addEventListener("click", () => {
                    syncScriptDraftFromDom();
                    uiState.showAdvancedRules = !uiState.showAdvancedRules;
                    renderApp();
                });
            }

            appRootEl.querySelectorAll("[data-toggle-script-rule]").forEach((button) => {
                button.addEventListener("click", () => {
                    syncScriptDraftFromDom();
                    const ruleName = button.dataset.toggleScriptRule;
                    uiState.expandedScriptRuleEditors[ruleName] = !uiState.expandedScriptRuleEditors[ruleName];
                    renderApp();
                });
            });

            const generateStoryboardBtn = document.getElementById("generate-storyboard-btn");
            if (generateStoryboardBtn) {
                generateStoryboardBtn.addEventListener("click", async () => {
                    try {
                        await runStoryboardGeneration();
                    } catch (error) {
                        setStatus(error.message || "Storyboard generation failed.", true);
                    }
                });
            }

            const regenerateStoryboardBtn = document.getElementById("regenerate-storyboard-btn");
            if (regenerateStoryboardBtn) {
                regenerateStoryboardBtn.addEventListener("click", async () => {
                    if (!window.confirm("Regenerate the full storyboard? This will overwrite all storyboard slides.")) {
                        return;
                    }
                    try {
                        await runStoryboardGeneration();
                    } catch (error) {
                        setStatus(error.message || "Storyboard regeneration failed.", true);
                    }
                });
            }

            const refineStoryboardBtn = document.getElementById("refine-storyboard-btn");
            if (refineStoryboardBtn) {
                refineStoryboardBtn.addEventListener("click", async () => {
                    try {
                        await refineStoryboardToEditor();
                    } catch (error) {
                        setStatus(error.message || "Storyboard refinement failed.", true);
                    }
                });
            }

            const addStoryboardSlideBtn = document.getElementById("add-storyboard-slide-btn");
            if (addStoryboardSlideBtn) {
                addStoryboardSlideBtn.addEventListener("click", async () => {
                    try {
                        await addStoryboardSlide();
                    } catch (error) {
                        setStatus(error.message || "Could not add storyboard slide.", true);
                    }
                });
            }

            appRootEl.querySelectorAll("[data-reset-rule]").forEach((button) => {
                button.addEventListener("click", async () => {
                    try {
                        await resetRuleOverride(button.dataset.resetRule);
                    } catch (error) {
                        setStatus(error.message || "Could not reset the rule override.", true);
                    }
                });
            });

            appRootEl.querySelectorAll("[data-save-rule-global]").forEach((button) => {
                button.addEventListener("click", async () => {
                    try {
                        await saveRuleAsGlobalDefault(button.dataset.saveRuleGlobal);
                    } catch (error) {
                        setStatus(error.message || "Could not save the global default.", true);
                    }
                });
            });

            appRootEl.querySelectorAll("[data-toggle-storyboard-notes]").forEach((button) => {
                button.addEventListener("click", () => {
                    openStoryboardNotes(Number(button.dataset.toggleStoryboardNotes));
                });
            });

            appRootEl.querySelectorAll("[data-storyboard-notes-input]").forEach((textarea) => {
                textarea.addEventListener("input", () => {
                    setStoryboardNotesDraft(Number(textarea.dataset.storyboardNotesInput), textarea.value);
                });
            });

            appRootEl.querySelectorAll("[data-submit-storyboard-notes]").forEach((button) => {
                button.addEventListener("click", async () => {
                    const slideIndex = Number(button.dataset.submitStoryboardNotes);
                    try {
                        await regenerateStoryboardSlide(
                            slideIndex,
                            uiState.storyboardNotesDrafts[String(slideIndex)] || ""
                        );
                    } catch (error) {
                        setStatus(error.message || "Could not update the storyboard slide with user notes.", true);
                    }
                });
            });

            appRootEl.querySelectorAll("[data-cancel-storyboard-notes]").forEach((button) => {
                button.addEventListener("click", () => {
                    closeStoryboardNotes(Number(button.dataset.cancelStoryboardNotes), {clearDraft: true});
                });
            });

            appRootEl.querySelectorAll("[data-remove-storyboard-slide]").forEach((button) => {
                button.addEventListener("click", async () => {
                    try {
                        await removeStoryboardSlide(Number(button.dataset.removeStoryboardSlide));
                    } catch (error) {
                        setStatus(error.message || "Could not remove the storyboard slide.", true);
                    }
                });
            });

            appRootEl.querySelectorAll("[data-storyboard-card]").forEach((cardEl) => {
                const cardIndex = Number(cardEl.dataset.storyboardCard);
                cardEl.addEventListener("dragstart", () => {
                    syncScriptDraftFromDom();
                    uiState.draggingStoryboardIndex = cardIndex;
                    cardEl.classList.add("dragging");
                });
                cardEl.addEventListener("dragend", () => {
                    uiState.draggingStoryboardIndex = null;
                    cardEl.classList.remove("dragging");
                });
                cardEl.addEventListener("dragover", (event) => {
                    event.preventDefault();
                });
                cardEl.addEventListener("drop", async (event) => {
                    event.preventDefault();
                    const fromIndex = uiState.draggingStoryboardIndex;
                    if (!fromIndex || fromIndex === cardIndex) {
                        return;
                    }
                    moveStoryboardCard(fromIndex, cardIndex);
                    uiState.draggingStoryboardIndex = null;
                    renderApp();
                    try {
                        await persistStoryboardOrder();
                    } catch (error) {
                        setStatus(error.message || "Could not update storyboard order.", true);
                    }
                });
            });
        }

        function bindModalActions() {
            const goToScriptWriterBtn = document.getElementById("go-to-script-writer-btn");
            if (goToScriptWriterBtn) {
                goToScriptWriterBtn.addEventListener("click", async () => {
                    syncDraftFromDom();
                    await ensureDefaultsLoaded();
                    setCurrentPage("script");
                    renderApp();
                });
            }

            const openSettingsBtn = document.getElementById("open-global-settings-btn");
            if (openSettingsBtn) {
                openSettingsBtn.addEventListener("click", async () => {
                    if (uiState.currentPage === "script") {
                        syncScriptDraftFromDom();
                    }
                    await ensureDefaultsLoaded(true);
                    uiState.settingsModalOpen = true;
                    renderApp();
                });
            }

            appRootEl.querySelectorAll("[data-open-image-modal]").forEach((button) => {
                button.addEventListener("click", () => {
                    openImageModal(button.dataset.imageSrc, button.dataset.openImageModal);
                });
            });

            const closeBtn = document.getElementById("close-image-modal-btn");
            if (closeBtn) {
                closeBtn.addEventListener("click", () => closeImageModal());
            }

            const overlay = document.getElementById("image-modal-overlay");
            if (overlay) {
                overlay.addEventListener("click", (event) => {
                    if (event.target === overlay) {
                        closeImageModal();
                    }
                });
            }

            const closeSettingsBtn = document.getElementById("close-settings-modal-btn");
            if (closeSettingsBtn) {
                closeSettingsBtn.addEventListener("click", () => {
                    uiState.settingsModalOpen = false;
                    renderApp();
                });
            }

            const settingsOverlay = document.getElementById("settings-modal-overlay");
            if (settingsOverlay) {
                settingsOverlay.addEventListener("click", (event) => {
                    if (event.target === settingsOverlay) {
                        uiState.settingsModalOpen = false;
                        renderApp();
                    }
                });
            }

            const saveGlobalSettingsBtn = document.getElementById("save-global-settings-btn");
            if (saveGlobalSettingsBtn) {
                saveGlobalSettingsBtn.addEventListener("click", async () => {
                    try {
                        const nextDefaults = {
                            general_rules: document.getElementById("global-general-rules")?.value || "",
                            hook_rules: document.getElementById("global-hook-rules")?.value || "",
                            default_characters: document.getElementById("global-default-characters")?.value || "",
                            refinement_rules: document.getElementById("global-refinement-rules")?.value || "",
                        };
                        const data = await fetchJson("/api/defaults", {
                            method: "PUT",
                            headers: {"Content-Type": "application/json"},
                            body: JSON.stringify(nextDefaults),
                        });
                        uiState.defaults = data.defaults;
                        uiState.defaultsLoaded = true;
                        uiState.settingsModalOpen = false;
                        renderApp();
                        setStatus("Global defaults updated.");
                    } catch (error) {
                        setStatus(error.message || "Could not save global defaults.", true);
                    }
                });
            }
        }

        function bindProjectDeleteActions() {
            appRootEl.querySelectorAll("[data-delete-project]").forEach((button) => {
                button.addEventListener("click", async () => {
                    await deleteProject(button.dataset.deleteProject);
                });
            });
        }

        function bindImageActions() {
            const fixedInput = document.getElementById("fixed-images-input");
            if (fixedInput) {
                document.getElementById("fixed-images-add-btn").addEventListener("click", () => fixedInput.click());
                fixedInput.addEventListener("change", async () => {
                    await uploadImages(Array.from(fixedInput.files || []), "fixed");
                    fixedInput.value = "";
                });
            }

            const scriptCharacterInput = document.getElementById("script-character-images-input");
            const scriptCharacterAddBtn = document.getElementById("script-character-images-add-btn");
            if (scriptCharacterInput && scriptCharacterAddBtn) {
                scriptCharacterAddBtn.addEventListener("click", () => scriptCharacterInput.click());
                scriptCharacterInput.addEventListener("change", async () => {
                    await uploadImages(Array.from(scriptCharacterInput.files || []), "script_character");
                    scriptCharacterInput.value = "";
                });
            }

            const defaultCharactersEl = document.getElementById("default-characters");
            if (defaultCharactersEl) {
                defaultCharactersEl.addEventListener("paste", async (event) => {
                    const imageFile = getImageFileFromClipboard(event);
                    if (!imageFile) {
                        return;
                    }

                    event.preventDefault();
                    await uploadImages([imageFile], "script_character");
                });
            }

            appRootEl.querySelectorAll("[data-open-slide-input]").forEach((button) => {
                const slideIndex = Number(button.dataset.openSlideInput);
                const input = document.getElementById(`slide-images-input-${slideIndex}`);
                button.addEventListener("click", () => input.click());
                input.addEventListener("change", async () => {
                    await uploadImages(Array.from(input.files || []), "slide", slideIndex);
                    input.value = "";
                });
            });

            appRootEl.querySelectorAll(".dropzone").forEach((dropzone) => {
                dropzone.addEventListener("dragover", (event) => {
                    event.preventDefault();
                    dropzone.classList.add("dragover");
                });
                dropzone.addEventListener("dragleave", () => dropzone.classList.remove("dragover"));
                dropzone.addEventListener("drop", async (event) => {
                    event.preventDefault();
                    dropzone.classList.remove("dragover");
                    const files = Array.from(event.dataTransfer?.files || []).filter((file) => file.type.startsWith("image/"));
                    if (files.length === 0) {
                        return;
                    }

                    const target = dropzone.dataset.target;
                    const slideIndex = dropzone.dataset.slideIndex ? Number(dropzone.dataset.slideIndex) : null;
                    await uploadImages(files, target, slideIndex);
                });

                dropzone.addEventListener("paste", async (event) => {
                    const imageFile = getImageFileFromClipboard(event);
                    if (!imageFile) {
                        return;
                    }

                    event.preventDefault();
                    const target = dropzone.dataset.target;
                    const slideIndex = dropzone.dataset.slideIndex ? Number(dropzone.dataset.slideIndex) : null;
                    await uploadImages([imageFile], target, slideIndex);
                });
            });

            appRootEl.querySelectorAll("[data-delete-image]").forEach((button) => {
                button.addEventListener("click", async () => {
                    const filename = button.dataset.deleteImage;
                    await deleteImage(filename);
                });
            });
        }

        function getImageFileFromClipboard(event) {
            const items = Array.from(event.clipboardData?.items || []);
            for (const item of items) {
                if (item.type.startsWith("image/")) {
                    return item.getAsFile();
                }
            }
            return null;
        }

        function syncDraftFromDom() {
            if (!state.currentProject) {
                return;
            }

            const aspectRatioEl = document.getElementById("aspect-ratio");
            const resolutionEl = document.getElementById("resolution");
            const fixedTextEl = document.getElementById("fixed-text-prompt");

            if (aspectRatioEl) {
                state.currentProject.aspect_ratio = aspectRatioEl.value;
            }
            if (resolutionEl) {
                state.currentProject.resolution = resolutionEl.value;
            }
            state.currentProject.page_count = state.currentProject.slides.length;
            if (fixedTextEl) {
                state.currentProject.fixed_text_prompt = fixedTextEl.value;
            }

            state.currentProject.slides.forEach((slide, index) => {
                const promptEl = document.getElementById(`slide-prompt-${index + 1}`);
                const fixedTextOverrideEl = document.getElementById(`slide-fixed-text-${index + 1}`);

                if (promptEl) {
                    slide.prompt = promptEl.value;
                }
                if (fixedTextOverrideEl) {
                    const normalized = fixedTextOverrideEl.value.trim();
                    slide.fixed_text_prompt_override = normalized ? fixedTextOverrideEl.value : null;
                }
            });
        }

        function createEmptySlide() {
            return {
                index: state.currentProject.slides.length + 1,
                prompt: "",
                fixed_text_prompt_override: null,
                images: [],
                generated: false,
                filename: "",
                generation_status: "idle",
                generation_error: null,
            };
        }

        function reindexLocalSlides() {
            state.currentProject.slides.forEach((slide, index) => {
                slide.index = index + 1;
            });
            state.currentProject.page_count = state.currentProject.slides.length;
        }

        function applyPendingPageCountToSlides() {
            state.currentProject.page_count = state.currentProject.slides.length;
            reindexLocalSlides();
        }

        function buildProjectPayload() {
            return {
                aspect_ratio: state.currentProject.aspect_ratio,
                resolution: state.currentProject.resolution,
                fixed_text_prompt: state.currentProject.fixed_text_prompt,
                page_count: Number(state.currentProject.page_count || state.currentProject.slides.length || 1),
                slides: state.currentProject.slides.map((slide, index) => ({
                    index: index + 1,
                    prompt: slide.prompt || "",
                    fixed_text_prompt_override: slide.fixed_text_prompt_override,
                    images: slide.images || [],
                    generated: Boolean(slide.generated),
                    filename: slide.filename || `s${index + 1}.png`,
                })),
            };
        }

        async function saveProject(showMessage = true, successMessage = "Project saved.") {
            if (!state.currentProject) {
                return;
            }

            syncDraftFromDom();
            applyPendingPageCountToSlides();
            setStatus("Saving project...");
            const data = await fetchJson(`/api/projects/${encodeURIComponent(state.currentProject.name)}`, {
                method: "PUT",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(buildProjectPayload()),
            });
            state.currentProject = data.project;
            renderApp();
            await loadProjects(state.currentProject.name, uiState.currentPage);
            if (showMessage) {
                setStatus(successMessage);
            } else {
                setStatus("");
            }
        }

        async function persistSlideStructure(successMessage) {
            reindexLocalSlides();
            renderApp();
            await saveProject(false);
            setStatus(successMessage);
        }

        async function insertSlideAt(insertBeforeIndex, successMessage) {
            if (!state.currentProject) {
                return;
            }
            if (isBatchBusy()) {
                setStatus("Wait for background generation to finish or cancel it first.", true);
                return;
            }

            syncDraftFromDom();
            await saveProject(false);
            setStatus("Adding slide...");
            const data = await fetchJson(`/api/projects/${encodeURIComponent(state.currentProject.name)}/slides/insert`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({insert_before_index: insertBeforeIndex}),
            });
            state.currentProject = data.project;
            renderApp();
            await loadProjects(state.currentProject.name, uiState.currentPage);
            setStatus(successMessage);
        }

        async function addSlideAbove(slideIndex) {
            await insertSlideAt(slideIndex, `Added a new slide above slide ${slideIndex}.`);
        }

        async function deleteSlideAt(slideIndex) {
            if (state.currentProject.slides.length <= 1) {
                setStatus("At least one slide is required.", true);
                return;
            }

            state.currentProject.slides.splice(slideIndex - 1, 1);
            await persistSlideStructure(`Deleted slide ${slideIndex}.`);
        }

        async function appendSlide() {
            const insertBeforeIndex = state.currentProject.slides.length + 1;
            await insertSlideAt(insertBeforeIndex, "Added a new slide at the bottom.");
        }

        async function uploadImages(files, target, slideIndex = null) {
            if (!files || files.length === 0) {
                return;
            }
            if (isBatchBusy()) {
                setStatus("Image changes are disabled while background generation is running.", true);
                return;
            }

            if (target === "script_character") {
                syncScriptDraftFromDom();
                await saveScriptState(false, "");
            } else {
                syncDraftFromDom();
                await saveProject(false);
            }
            setStatus("Uploading image assets...");
            for (const file of files) {
                const formData = new FormData();
                formData.append("image", file);
                formData.append("target", target);
                if (slideIndex !== null && slideIndex !== undefined) {
                    formData.append("slide_index", String(slideIndex));
                }

                const response = await fetch(`/api/projects/${encodeURIComponent(state.currentProject.name)}/upload-image`, {
                    method: "POST",
                    body: formData,
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || "Image upload failed.");
                }
                state.currentProject = data.project;
            }

            renderApp();
            await loadProjects(state.currentProject.name, uiState.currentPage);
            setStatus("Image uploaded.");
        }

        async function deleteImage(filename) {
            if (!filename) {
                return;
            }
            if (isBatchBusy()) {
                setStatus("Image changes are disabled while background generation is running.", true);
                return;
            }

            setStatus(`Deleting ${filename}...`);
            const data = await fetchJson(`/api/projects/${encodeURIComponent(state.currentProject.name)}/delete-image/${encodeURIComponent(filename)}`, {
                method: "DELETE",
            });
            state.currentProject = data.project;
            renderApp();
            setStatus("Image deleted.");
        }

        function cancelGeneration(slideIndex) {
            const controller = getGenerationController(slideIndex);
            if (!controller) {
                return;
            }

            controller.abort();
            clearGenerationController(slideIndex);
            setSlideFeedback(slideIndex, {
                state: "cancelled",
                title: "Generation cancelled",
                message: "The image request was cancelled.",
            });
            renderApp();
            setStatus(`Cancelled generation for slide ${slideIndex}.`);
        }

        async function generateSlide(slideIndex) {
            try {
                if (isBatchBusy()) {
                    setStatus("Per-slide generation is disabled while background generation is running.", true);
                    return;
                }
                if (isSlideBusy(slideIndex)) {
                    return;
                }
                setSlideFeedback(slideIndex, {
                    state: "loading",
                    title: "Generating image",
                    message: "Gemini is creating this slide...",
                });
                renderApp();
                await saveProject(false);
                setStatus(`Generating slide ${slideIndex}...`);
                const controller = new AbortController();
                setGenerationController(slideIndex, controller);
                const data = await fetchJson(`/api/projects/${encodeURIComponent(state.currentProject.name)}/generate/${slideIndex}`, {
                    method: "POST",
                    signal: controller.signal,
                });
                state.currentProject = data.project;
                clearGenerationController(slideIndex);
                clearSlideFeedback(slideIndex);
                renderApp();
                await loadProjects(state.currentProject.name, uiState.currentPage);
                setStatus(`Slide ${slideIndex} generated.`);
            } catch (error) {
                clearGenerationController(slideIndex);
                if (error?.name === "AbortError") {
                    setSlideFeedback(slideIndex, {
                        state: "cancelled",
                        title: "Generation cancelled",
                        message: "The image request was cancelled.",
                    });
                    renderApp();
                    setStatus(`Cancelled generation for slide ${slideIndex}.`);
                    return;
                }
                setSlideFeedback(slideIndex, {
                    state: "error",
                    title: "Generate failed",
                    message: error.message || "Something went wrong while generating this slide.",
                });
                renderApp();
                setStatus(error.message || "Slide generation failed.", true);
            }
        }

        async function updateSlide(slideIndex) {
            try {
                if (isBatchBusy()) {
                    setStatus("Per-slide updates are disabled while background generation is running.", true);
                    return;
                }
                if (isSlideBusy(slideIndex)) {
                    return;
                }
                setSlideFeedback(slideIndex, {
                    state: "loading",
                    title: "Updating image",
                    message: "Gemini is refining this slide...",
                });
                renderApp();
                await saveProject(false);
                setStatus(`Updating slide ${slideIndex}...`);
                const controller = new AbortController();
                setGenerationController(slideIndex, controller);
                const data = await fetchJson(`/api/projects/${encodeURIComponent(state.currentProject.name)}/update/${slideIndex}`, {
                    method: "POST",
                    signal: controller.signal,
                });
                state.currentProject = data.project;
                clearGenerationController(slideIndex);
                clearSlideFeedback(slideIndex);
                renderApp();
                await loadProjects(state.currentProject.name, uiState.currentPage);
                setStatus(`Slide ${slideIndex} updated.`);
            } catch (error) {
                clearGenerationController(slideIndex);
                if (error?.name === "AbortError") {
                    setSlideFeedback(slideIndex, {
                        state: "cancelled",
                        title: "Update cancelled",
                        message: "The image update request was cancelled.",
                    });
                    renderApp();
                    setStatus(`Cancelled update for slide ${slideIndex}.`);
                    return;
                }
                setSlideFeedback(slideIndex, {
                    state: "error",
                    title: "Update failed",
                    message: error.message || "Something went wrong while updating this slide.",
                });
                renderApp();
                setStatus(error.message || "Slide update failed.", true);
            }
        }

        async function generateAllSlides() {
            if (isBatchBusy()) {
                setStatus("Background generation is already running.", true);
                return;
            }
            syncDraftFromDom();
            applyPendingPageCountToSlides();
            setStatus("Starting background generation...");
            const data = await fetchJson(`/api/projects/${encodeURIComponent(state.currentProject.name)}/generate-all`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(buildProjectPayload()),
            });
            state.currentProject = data.project;
            renderApp();
            await refreshProjectIndex();
            syncBatchStatusMessage();
        }

        async function cancelGenerateAllSlides() {
            if (!isBatchBusy()) {
                return;
            }
            setStatus("Requesting batch cancellation...");
            const data = await fetchJson(`/api/projects/${encodeURIComponent(state.currentProject.name)}/generate-all/cancel`, {
                method: "POST",
            });
            state.currentProject = data.project;
            renderApp();
            syncBatchStatusMessage();
        }

        async function createProject() {
            const rawName = window.prompt("Project name");
            if (!rawName) {
                return;
            }

            const pages = window.prompt("How many slides?", "5");
            setStatus("Creating project...");
            const data = await fetchJson("/api/projects", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    name: rawName,
                    page_count: Number(pages || 5),
                    aspect_ratio: "1:1",
                    resolution: "1K",
                    fixed_text_prompt: "",
                }),
            });

            state.currentProject = data.project;
            setCurrentPage("script");
            await ensureDefaultsLoaded();
            await loadProjects(state.currentProject.name, uiState.currentPage);
            setStatus("Project created.");
        }

        newProjectBtn.addEventListener("click", async () => {
            try {
                await createProject();
            } catch (error) {
                setStatus(error.message, true);
            }
        });

        window.addEventListener("error", (event) => {
            setStatus(event.message, true);
        });

        window.addEventListener("unhandledrejection", (event) => {
            setStatus(event.reason?.message || "Unexpected error.", true);
        });

        loadProjects().catch((error) => setStatus(error.message, true));
    </script>
</body>
</html>
